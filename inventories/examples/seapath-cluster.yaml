# This inventory describes a SEAPATH cluster. It contains all required variables for a default deployment
# Replace all the TODOs to fit your physical machines.
# More informations on SEAPATH Wiki: https://lf-energy.atlassian.net/wiki/x/BIDtGQ

# Note : This inventory uses a three hypervisors setup.
# If you want to switch to a two hypervisor + one observer setup, you must :
# - choose which machine will be the observer (ex: observer)
# - remove the machine from the hypervisors group
# - add the machine to the observers group
# - remove the machine from the osds group
# - optionally, remove the ptp_interface variable of the machine

---
all:
  hosts:
    hypervisor1:
      ansible_host: 10.201.20.1
      network_interface: enp6s0
      ptp_interface: "enp6s0"

    hypervisor2:
      ansible_host: 10.201.20.2
      network_interface: enp6s0
      ptp_interface: "enp6s0"

    observer:
      ansible_host: 10.201.20.3
      network_interface: enp7s0
      ptp_interface: "enp7s0"

  vars:
    admin_user: admin

    # Main network configuration
    gateway_addr: "10.201.0.1"
    dns_servers: "10.201.0.1"
    subnet: 16
    ntp_servers:
      - "92.222.117.115"
      - "91.194.60.128"
      - "82.67.41.119"
      - "51.68.44.27"
    ptp_domain_number: 0 # PTP domain number (0 to 255)
    timemaster_ptp_domain_number: "{{ ptp_domain_number }}"
    ptp_status_vsock_domain_number: "{{ ptp_domain_number }}"

    # SEAPATH ansible variables
    ansible_connection: ssh
    ansible_python_interpreter: /usr/bin/python3
    ansible_remote_tmp: /tmp/.ansible/tmp
    ansible_user: ansible
    ip_addr: "{{ ansible_host }}"
    hostname: "{{ inventory_hostname }}"
    apply_network_config: true

    # Hardening Debian specific
    # On Debian you can defined the Grub (Bootloader) protected password here
    # Use grub2-mkpasswd-pbkdf2 / grub-mkpasswd-pbkdf2 to encoded it.
    # Default password is seapath
    grub_password: "grub.pbkdf2.sha512.10000.876266D5A876FADE04725F61C182BE34F1D552018AB495CF757AB6F7BF46E965D67FF1ADAFFA930CA850A4B738121EA13FA2E497CBA576CE16C7FBFC25485635.42CAC92CF24D06470F2AC2A0588506C02A972BA0C85BD2599BFC141FE0C865E8A5CD15CED6080AA3810C68EF38880E9825CB180BA5F704FE4F54FF49B690948C"
    deploy_cephfs: false

hypervisors:
  hosts:
    hypervisor1:
    hypervisor2:
  vars:
    isolcpus: "4-6"
    livemigration_user: libvirtadmin

observers:
  hosts:
    observer:
# Cluster part. More information on the wiki: https://lf-energy.atlassian.net/wiki/x/SgB9GQ
cluster_machines:
  hosts:
    hypervisor1:
      team0_0: "enp9s0" # Cluster interface connected to hypervisor2.
      team0_1: "enp8s0" # Cluster interface connected to observer.
      cluster_ip_addr: "192.168.55.1" # IP address of this node on the cluster.
      cluster_next_ip_addr: "192.168.55.2" # IP address of hypervisor2 on the cluster.
      cluster_previous_ip_addr: "192.168.55.3" # IP address of observer on the cluster.

    hypervisor2:
      team0_0: "enp9s0" # Cluster interface connected to observer.
      team0_1: "enp8s0" # Cluster interface connected to hypervisor1.
      cluster_ip_addr: "192.168.55.2" # IP address of this node on the cluster.
      cluster_next_ip_addr: "192.168.55.3" # IP address of observer on the cluster.
      cluster_previous_ip_addr: "192.168.55.1" # IP address of hypervisor1 on the cluster.

    observer:
      team0_0: "ens6f1" # Cluster interface connected to hypervisor1.
      team0_1: "ens6f0" # Cluster interface connected to hypervisor2.
      cluster_ip_addr: "192.168.55.3" # IP address of this node on the cluster.
      cluster_next_ip_addr: "192.168.55.1" # IP address of hypervisor1 on the cluster.
      cluster_previous_ip_addr: "192.168.55.2" # IP address of hypervisor2 on the cluster.
      br_rstp_priority: 12288 # Do not modify, used by RSTP

  vars:
    deploy_cephfs: false # Change to true to deploy cephfs on your cluster

# Ceph monitor. All machines in the cluster must be part of mons groups
# Note : By default SEAPATH uses ceph-ansible to configure Ceph.
# You can also switch to cephadm deployment by setting force_cephadm to true (available on Debian and SLES)
mons:
  hosts:
    hypervisor1:
    hypervisor2:
    observer:
  vars:
    cephadm_network: "192.168.55.0/24"
    cephadm_pullimages: true
    cephadm_release: "18.2.7"
    cephadm_release_name: "reef"
    ceph_origin: distro
    cluster_network: "192.168.55.0/24" # IP range of your cluster.
    public_network: "{{ cluster_network }}"
    monitor_address: "{{ cluster_ip_addr }}"
    cephadm_network: "{{ public_network }}"
    configure_firewall: true
    ntp_service_enabled: true
    dashboard_enabled: false
    ceph_conf_overrides:
      global:
        osd_pool_default_size: "{{ groups['hypervisors'] | length }}"
        osd_pool_default_min_size: 1
        osd_crush_chooseleaf_type: 1
        mon_osd_min_down_reporters: 1
      mon:
        auth_allow_insecure_global_id_reclaim: false
      osd:
        osd memory target: 8076326604

# Ceph OSD. Machines that will be used as OSDs (which will store data)
# Only hypervisors are part of the OSD group
osds:
  hosts:
    hypervisor1:
      # Set this to the path of the disk that will contains ceph data.
      # The path can be found in "/dev/disk/by-path/"
      ceph_osd_disk: "/dev/disk/by-path/pci-0000:00:17.0-ata-4"
    hypervisor2:
      ceph_osd_disk: "/dev/disk/by-path/pci-0000:00:17.0-ata-4"
    observer:
      ceph_osd_disk: "/dev/disk/by-path/pci-0000:00:1f.2-ata-2"
  vars:
    devices: "{{ ceph_osd_disk }}"

# Ceph clients. All machines in the cluster must be part of clients groups
clients:
  hosts:
    hypervisor1:
    hypervisor2:
    observer:
  vars:
    user_config: true
    rbd:
      name: "rbd"
      application: "rbd"
      pg_autoscale_mode: "on"
      target_size_ratio: 1
    pools:
      - "{{ rbd }}"
    keys:
      - name: client.libvirt
        caps:
          mon: 'profile rbd, allow command "osd blacklist"'
          osd: "allow class-read object_prefix rbd_children, profile rbd pool=rbd"
        mode: "{{ ceph_keyring_permissions }}"

# Empty groups to prevent warnings
standalone_machine:
